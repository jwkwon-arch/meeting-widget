<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>회의 담당자</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      font-family:
        Arial,
        "Apple SD Gothic Neo",
        "Noto Sans KR",
        sans-serif;
    }

    .card {
      width: 100%;
      min-height: 190px;
      padding: 28px 24px;
      border: 1px solid #555;
      border-radius: 14px;
      background: #2f2f2f;
      color: #ffffff;

      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .current-label {
      margin-bottom: 8px;
      font-size: 16px;
      font-weight: 700;
    }

    .current-name {
      margin-bottom: 26px;
      font-size: 34px;
      font-weight: 800;
      line-height: 1.2;
    }

    .next-person {
      font-size: 16px;
      font-weight: 600;
      color: #dddddd;
    }

    .next-name {
      color: #ffffff;
      font-weight: 800;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="current-label">
      📢 이번 주 회의 담당자
    </div>

    <div class="current-name" id="currentPerson">
      계산 중
    </div>

    <div class="next-person">
      ➡️ 다음 주 회의 담당자 :
      <span class="next-name" id="nextPerson">계산 중</span>
    </div>
  </div>

  <script>
    const members = [
      "황영기",
      "이슬",
      "정지원",
      "강지현",
      "장서희",
      "권재원",
      "최건흠"
    ];

    /*
      담당 순서 기준:

      2026-06-08 황영기
      2026-06-15 이슬
      2026-06-22 정지원
      2026-06-29 강지현
      2026-07-06 장서희
      2026-07-13 권재원
      2026-07-20 최건흠
    */
    const baseMonday = "2026-06-08";

    function parseDate(dateText) {
      const parts = dateText.split("-").map(Number);

      return new Date(
        parts[0],
        parts[1] - 1,
        parts[2],
        12,
        0,
        0
      );
    }

    function getTestDate() {
      const parameters = new URLSearchParams(window.location.search);
      const testDate = parameters.get("date");

      if (
        testDate &&
        /^\d{4}-\d{2}-\d{2}$/.test(testDate)
      ) {
        return parseDate(testDate);
      }

      return new Date();
    }

    function getMonday(date) {
      const result = new Date(date);

      const day = result.getDay();
      const difference = day === 0 ? -6 : 1 - day;

      result.setDate(result.getDate() + difference);
      result.setHours(12, 0, 0, 0);

      return result;
    }

    function positiveModulo(number, divisor) {
      return ((number % divisor) + divisor) % divisor;
    }

    function updateMeetingPerson() {
      const selectedDate = getTestDate();
      const currentMonday = getMonday(selectedDate);
      const startingMonday = getMonday(parseDate(baseMonday));

      const millisecondsPerWeek =
        7 * 24 * 60 * 60 * 1000;

      const weeksPassed = Math.round(
        (currentMonday.getTime() - startingMonday.getTime()) /
        millisecondsPerWeek
      );

      const currentIndex = positiveModulo(
        weeksPassed,
        members.length
      );

      const nextIndex = positiveModulo(
        currentIndex + 1,
        members.length
      );

      document.getElementById("currentPerson").textContent =
        members[currentIndex];

      document.getElementById("nextPerson").textContent =
        members[nextIndex];
    }

    updateMeetingPerson();

    setInterval(
      updateMeetingPerson,
      60 * 60 * 1000
    );
  </script>
</body>
</html>
