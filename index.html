<script>
  const members = [
    "황영기",
    "이슬",
    "정지원",
    "강지현",
    "장서희",
    "권재원",
    "최건흠"
  ];

  /*
    2026년 6월 8일 월요일을 황영기 담당 주로 설정

    6월 8일  : 황영기
    6월 15일 : 이슬
    6월 22일 : 정지원
    6월 29일 : 강지현
    7월 6일  : 장서희
    7월 13일 : 권재원
    7월 20일 : 최건흠
    7월 27일 : 황영기
  */
  const baseMonday = new Date("2026-06-08T00:00:00+09:00");

  function getKoreaMonday() {
    const koreaNow = new Date(
      new Date().toLocaleString("en-US", {
        timeZone: "Asia/Seoul"
      })
    );

    const day = koreaNow.getDay();
    const difference = day === 0 ? -6 : 1 - day;

    koreaNow.setDate(koreaNow.getDate() + difference);
    koreaNow.setHours(0, 0, 0, 0);

    return koreaNow;
  }

  function updateMeetingPerson() {
    const currentMonday = getKoreaMonday();
    const millisecondsPerWeek = 7 * 24 * 60 * 60 * 1000;

    const weeksPassed = Math.round(
      (currentMonday.getTime() - baseMonday.getTime()) /
      millisecondsPerWeek
    );

    const currentIndex =
      ((weeksPassed % members.length) + members.length) %
      members.length;

    const nextIndex = (currentIndex + 1) % members.length;

    document.getElementById("currentPerson").textContent =
      members[currentIndex];

    document.getElementById("nextPerson").textContent =
      members[nextIndex];
  }

  updateMeetingPerson();

  // 페이지를 계속 열어둔 경우에도 1시간마다 확인
  setInterval(updateMeetingPerson, 60 * 60 * 1000);
</script>
